<!DOCTYPE html>
<html>
    <head>
        <title>
            Yt clone
        </title>
        <link rel="stylesheet" href="yt-clone.css">
    </head>
    <body>
        <div class="topbar">
            <div class="left-section">
                <img class="hamburger" src="public/hamburger.svg">
                <img class="yt-logo" src="public/yt-logo.svg">
            </div>
            <div class="middle-section">
                <input class="search" type="text" placeholder="Search">
                <div class="search-icon-div">
                    <img class="search-icon" src="public/search.svg">
                </div>
                <div class="voice-search-icon-div">
                    <img class="voice-search-icon" src="public/voice-search-icon.svg">
                </div>
            </div>
            <div class="right-section">
                <div class="upload-div">
                    <img class="upload-icon" src="public/upload.svg">
                    <div class="tool-tip">
                        Create
                    </div>
                </div>
                <div class="yt-apps-div">
                    <img class="yt-apps-icon" src="public/youtube-apps.svg">
                    <div class="tool-tip">
                        Youtube apps
                    </div>
                </div>
                <div class="notifications-div">
                    <img class="notifications-icon" src="public/notifications.svg">
                    <div class="notification-count">
                        3
                    </div>
                </div>
                <div>
                    <img class="profile-icon" src="public/my-channel-pic.jpeg">
                </div>
            </div>
        </div>
        <div class="sidebar">
            <div class="sidebar-link">
                <img class="home-icon" src="public/home.svg">
                <div class="sidebar-text">
                    Home
                </div>
            </div>
            <div class="sidebar-link">
                <img class="explore-icon" src="public/explore.svg">
                <div class="sidebar-text">
                    Explore
                </div>
            </div>
            <div class="sidebar-link">
                <img class="subscriptions-icon" src="public/subscriptions.svg">
                <div class="sidebar-text">
                    Subscriptions
                </div>
            </div>
            <div class="sidebar-link">
                <img class="originals-icon" src="public/originals.svg">
                <div class="sidebar-text">
                    Originals
                </div>
            </div>
            <div class="sidebar-link">
                <img class="yt-music-icon" src="public/youtube-music.svg">
                <div class="sidebar-text">
                    Youtube Music
                </div>
            </div>
            <div class="sidebar-link">
                <img class="library-icon" src="public/library.svg">
                <div class="sidebar-text">
                    Library
                </div>
            </div>
        </div>
    </body>
</html>
